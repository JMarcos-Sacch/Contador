<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Acesso Simplificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col p-4 select-none">

    <div class="grid grid-cols-2 flex-1 min-h-[60vh] rounded-2xl overflow-hidden shadow-lg">
        
        <div onclick="registrar('entrada', 1)" class="bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 flex flex-col justify-between cursor-pointer transition-colors relative group">
            <div class="text-center pt-6">
                <span class="text-xl font-bold tracking-widest uppercase opacity-80">Entradas</span>
                <div id="btn-entrada-txt" class="text-7xl font-black mt-8">0</div>
            </div>
            
            <button onclick="event.stopPropagation(); registrar('entrada', -1)" class="w-full h-10 bg-emerald-900 hover:bg-black/30 text-emerald-200 font-semibold text-sm transition-colors border-t border-emerald-500/20">
                Retornar
            </button>
        </div>

        <div onclick="registrar('saida', 1)" class="bg-red-600 hover:bg-red-700 active:bg-red-800 flex flex-col justify-between cursor-pointer transition-colors relative group">
            <div class="text-center pt-6">
                <span class="text-xl font-bold tracking-widest uppercase opacity-80">Saídas</span>
                <div id="btn-saida-txt" class="text-7xl font-black mt-8">0</div>
            </div>
            
            <button onclick="event.stopPropagation(); registrar('saida', -1)" class="w-full h-10 bg-red-900 hover:bg-black/30 text-red-200 font-semibold text-sm transition-colors border-t border-red-500/20">
                Retornar
            </button>
        </div>

    </div>

    <div class="mt-6 bg-gray-800 rounded-2xl p-4 shadow-inner">
        <h2 class="text-sm font-semibold tracking-wider text-gray-400 uppercase mb-3">Registros</h2>
        
        <div id="lista-vazia" class="text-center py-6 text-gray-500 italic">
            Nenhuma marcação realizada ainda.
        </div>

        <div id="tabela-horarios" class="divide-y divide-gray-700 hidden">
            </div>
    </div>

    <div class="mt-4 bg-gray-950 rounded-2xl p-5 flex justify-between items-center border border-gray-800">
        <div>
            <h3 class="text-lg font-bold text-gray-200">Pessoas na Área de Segurança</h3>
            <p class="text-xs text-gray-500">Saldo total dentro do perímetro</p>
        </div>
        <div id="total-presentes" class="text-5xl font-black text-yellow-400">0</div>
    </div>

    <script>
        const dadosFluxo = {};
        let ultimaHoraRegistrada = getHoraAtualStr();

        function getHoraAtualStr() {
            const agora = new Date();
            return `${String(agora.getHours()).padStart(2, '0')}:00`;
        }

        // Garante que a hora atual sempre exista na nossa base de dados
        function inicializarHoraAtual() {
            const horaAtual = getHoraAtualStr();
            if (!dadosFluxo[horaAtual]) {
                dadosFluxo[horaAtual] = { entradas: 0, saidas: 0 };
            }
        }

        function registrar(tipo, valor) {
            const horaAtual = getHoraAtualStr();
            inicializarHoraAtual();

            if (tipo === 'entrada') {
                if (dadosFluxo[horaAtual].entradas + valor >= 0) {
                    dadosFluxo[horaAtual].entradas += valor;
                }
            } else if (tipo === 'saida') {
                if (dadosFluxo[horaAtual].saidas + valor >= 0) {
                    dadosFluxo[horaAtual].saidas += valor;
                }
            }

            atualizarInterface();
        }

        function atualizarInterface() {
            const horaAtual = getHoraAtualStr();
            inicializarHoraAtual();
            
            // Atualiza os números grandes da tela com base APENAS na hora atual
            document.getElementById('btn-entrada-txt').innerText = dadosFluxo[horaAtual].entradas;
            document.getElementById('btn-saida-txt').innerText = dadosFluxo[horaAtual].saidas;

            const tabelaCorpo = document.getElementById('tabela-horarios');
            const listaVazia = document.getElementById('lista-vazia');
            
            tabelaCorpo.innerHTML = '';
            
            let totalGeralEntradas = 0;
            let totalGeralSaidas = 0;

            // Pega todas as horas registradas e ordena da mais recente para a mais antiga
            const horariosComDados = Object.keys(dadosFluxo).sort((a, b) => b.localeCompare(a));

            // Filtra para não mostrar linhas totalmente zeradas no histórico, mantendo o painel limpo
            const horariosVisiveis = horariosComDados.filter(hora => dadosFluxo[hora].entradas > 0 || dadosFluxo[hora].saidas > 0);

            if (horariosVisiveis.length === 0) {
                listaVazia.classList.remove('hidden');
                tabelaCorpo.classList.add('hidden');
            } else {
                listaVazia.classList.add('hidden');
                tabelaCorpo.classList.remove('hidden');

                horariosVisiveis.forEach(hora => {
                    const entradas = dadosFluxo[hora].entradas;
                    const saidas = dadosFluxo[hora].saidas;
                    
                    // O saldo acumulado geral continua contando tudo, mesmo de horas passadas
                    totalGeralEntradas += entradas;
                    totalGeralSaidas += saidas;

                    const divLinha = document.createElement('div');
                    divLinha.className = `flex justify-between items-center py-3 text-sm font-medium ${hora === horaAtual ? 'border-b border-dashed border-gray-600 pb-4 mb-1' : ''}`;
                    
                    // Adiciona uma marcação visual discreta se for a hora que está ativa no momento
                    const tagAtual = hora === horaAtual ? ' <span class="text-xs bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded ml-1 font-normal">Atual</span>' : '';

                    divLinha.innerHTML = `
                        <div class="text-gray-300 font-mono">${hora}${tagAtual}</div>
                        <div class="flex gap-8 text-center">
                            <span class="text-emerald-400 w-20">Entradas: ${entradas}</span>
                            <span class="text-red-400 w-20">Saídas: ${saidas}</span>
                        </div>
                        <div class="text-gray-400 text-xs">Saldo: ${entradas - saidas}</div>
                    `;
                    tabelaCorpo.appendChild(divLinha);
                });
            }

            // O saldo final de pessoas na área segura considera o histórico TODO (Entradas Totais - Saídas Totais)
            // Se o histórico visível estiver vazio, recalculamos varrendo o objeto completo
            if (horariosVisiveis.length === 0) {
                Object.keys(dadosFluxo).forEach(hora => {
                    totalGeralEntradas += dadosFluxo[hora].entradas;
                    totalGeralSaidas += dadosFluxo[hora].saidas;
                });
            }

            const saldoFinal = totalGeralEntradas - totalGeralSaidas;
            document.getElementById('total-presentes').innerText = saldoFinal < 0 ? 0 : saldoFinal;
        }

        // Função executada a cada 1 segundo para verificar a virada da hora no relógio do celular
        function verificarViradaDeHora() {
            const horaAgora = getHoraAtualStr();
            if (horaAgora !== ultimaHoraRegistrada) {
                ultimaHoraRegistrada = horaAgora;
                inicializarHoraAtual();
                atualizarInterface(); // Isso vai zerar os contadores visuais dos botões automaticamente
            }
        }

        // Inicialização do App
        inicializarHoraAtual();
        atualizarInterface();
        setInterval(verificarViradaDeHora, 1000); // Checa o relógio a cada segundo
    </script>
</body>
</html>
